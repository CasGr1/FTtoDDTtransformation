#      - [ BarraCuDA3, CuDAcost ]
#      - [BarraCuDA3, BUDAcost]
#      - [EDAcost,  EDA]
#      - [BUDAcost, BUDA]
#      - [CuDAcost, CuDA]
#      - [PaDAcost, PaDA]
#    pairs:
#      - [BUDAcost, CuDAcost]
#      - [BUDAcost, PaDAcost]
#      - [CuDAcost, PaDAcost]
    color:
      - "#2E5A9A" # main points (medium blue)
      - "#55A868" # red (for y=x line)
      - "#DD8452"
    markers:
#      - x
#      - o
#      - p

  summary:
    type: summary
    metric: expcost_given_failure
    plottype: bar
    pltdata: avg
    names:
      - EDAcost
      - EDA
      - BUDAcost
      - BUDA
      - CuDAcost
      - CuDA
      - PaDAcost
      - PaDA
    colors:
      - "#F2B38F" # orange
      - "#DD8452"

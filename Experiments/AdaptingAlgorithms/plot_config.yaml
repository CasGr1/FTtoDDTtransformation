active_plot: x_yplot

data:
  folder: ../CombinedAlgorithms/results/AgainstBUDA
#  folder: Results/FFORT/
  addition: .csv

output:
  show: true
  save: false
  dir: figures/

plots:
  x_ysubplot:
    type: xy
    metric: expcost_given_failure
    log: true
    failure: true
    layout: [2, 2]
    pairs:

#      - [BarraCuDA1, CuDAcost]
#      - [BarraCuDA2, CuDAcost]
#      - [BarraCuDA3, CuDAcost]
      - [EDAcost, EDA]
      - [BUDAcost, BUDA]
      - [CuDAcost, CuDA]
      - [PaDAcost, PaDA]
    color:
      - "#4C72B0" # blue
      - "#C44E52" # red

  x_yplot:
    type: xy
    metric: expcost_given_failure
    log: false
    failure: false
    layout: [1,1]
    overlay: false
    pairs:
#      - [ BarraCuDA0, CuDAcost ]
#      - [ BarraCuDA1, CuDAcost ]
      - [BarraCuDA1, BarraCuDA2]
#      - [ BarraCuDA1, BUDAcost]
